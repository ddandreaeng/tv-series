# Test profile: use H2 in-memory DB (no Docker required)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
quarkus.hibernate-orm.database.generation=drop-and-create

# Disable OpenTelemetry export in tests
quarkus.otel.enabled=false

# Disable Dev Services (not needed with explicit config above)
quarkus.devservices.enabled=false
