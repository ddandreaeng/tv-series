# HTTP Server
quarkus.http.host=0.0.0.0
quarkus.http.port=8080

# Datasource (Dev Services handles in dev/test, explicit config for prod)
quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=quarkus
%prod.quarkus.datasource.password=quarkus
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/tv_series_db

# Hibernate
quarkus.hibernate-orm.database.generation.method=update
quarkus.hibernate-orm.log.sql=false

# JSON Logging (§9.1)
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n
quarkus.log.console.json.enabled=true
quarkus.log.console.json.pretty-print=false
quarkus.log.level=INFO

# OpenTelemetry (§9.2)
quarkus.otel.enabled=true
quarkus.otel.traces.enabled=true
quarkus.otel.metrics.enabled=false
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
quarkus.otel.service.name=tv-series

# Prometheus Metrics (§9.3)
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.binder.http-server.enabled=true
